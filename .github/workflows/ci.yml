name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run Go fmt check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Code is not formatted, run 'gofmt -w .'"
            exit 1
          fi

      - name: Run Go vet
        run: go vet ./...

      - name: Run staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'web/node_modules'

      - name: Install dependencies
        run: cd web && npm ci

      - name: Type check
        run: cd web && npx vue-tsc --noEmit

      - name: Build
        run: cd web && npm run build

  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    needs: [lint, test, frontend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Create dist directory
        run: mkdir -p dist

      - name: Build Linux AMD64
        run: |
          GOOS=linux GOARCH=amd64 go build -o bin/iec104-sim-linux-amd64 ./cmd/iec104-sim/
          tar -czf dist/iec104-sim-${GITHUB_REF_NAME}-linux-amd64.tar.gz -C .. iec104-sim-master/bin/iec104-sim-linux-amd64

      - name: Build Linux ARM64
        run: |
          GOOS=linux GOARCH=arm64 go build -o bin/iec104-sim-linux-arm64 ./cmd/iec104-sim/
          tar -czf dist/iec104-sim-${GITHUB_REF_NAME}-linux-arm64.tar.gz -C .. iec104-sim-master/bin/iec104-sim-linux-arm64

      - name: Build Windows AMD64
        run: |
          GOOS=windows GOARCH=amd64 go build -o bin/iec104-sim-windows-amd64.exe ./cmd/iec104-sim/
          cd dist && powershell -Command "Compress-Archive -Path ../bin/iec104-sim-windows-amd64.exe -DestinationPath iec104-sim-${GITHUB_REF_NAME}-windows-amd64.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
          draft: false
          prerelease: ${{ github.ref != 'refs/heads/main' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
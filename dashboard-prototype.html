<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>实时趋势 — IEC104 模拟器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary:#0a0e17;--bg-secondary:#111827;--bg-tertiary:#1a1f2e;
  --bg-card:#0f1520;--border:#1e293b;--border-hover:#334155;
  --text-primary:#e2e8f0;--text-secondary:#94a3b8;--text-muted:#475569;
  --accent-amber:#f59e0b;--accent-teal:#14b8a6;--accent-red:#ef4444;
  --accent-blue:#3b82f6;--accent-purple:#a855f7;--glow-amber:rgba(245,158,11,0.12);
  --radius:6px;--font-display:'Plus Jakarta Sans',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:var(--font-display);background:var(--bg-primary);color:var(--text-primary);
  height:100vh;display:flex;overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(30,41,59,0.25) 1px,transparent 1px),
    linear-gradient(90deg,rgba(30,41,59,0.25)1px,transparent 1px);
  background-size:24px 24px;pointer-events:none;z-index:0;
}
.sidebar{
  width:64px;background:var(--bg-secondary);border-right:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;padding:20px 0;gap:4px;z-index:1;transition:width .2s;
}
.sidebar:hover{width:200px;}
.sidebar:hover .nav-label{opacity:1;width:auto;}
.sidebar:hover .nav-item{width:180px;justify-content:flex-start;padding:0 16px;gap:12px;}
.nav-item{
  width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--radius);cursor:pointer;transition:all .15s;
  color:var(--text-muted);overflow:hidden;white-space:nowrap;
}
.nav-item:hover{background:var(--bg-tertiary);color:var(--text-primary);}
.nav-item.active{background:var(--glow-amber);color:var(--accent-amber);}
.nav-icon{font-size:20px;flex-shrink:0;}
.nav-label{font-size:13px;font-weight:500;opacity:0;width:0;transition:all .2s;overflow:hidden;}
.main{flex:1;display:flex;flex-direction:column;z-index:1;min-width:0;}
.topbar{
  height:56px;display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;border-bottom:1px solid var(--border);position:relative;
}
.topbar::after{
  content:'';position:absolute;bottom:-1px;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent-amber),transparent);opacity:.3;
}
.topbar-left{display:flex;align-items:center;gap:16px;}
.topbar-title{font-size:18px;font-weight:600;}
.topbar-subtitle{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);}
.topbar-right{display:flex;align-items:center;gap:16px;}
.status-group{display:flex;gap:16px;}
.status-item{display:flex;align-items:center;gap:6px;font-size:13px;}
.status-dot{width:8px;height:8px;border-radius:50%;}
.status-dot.online{background:var(--accent-teal);box-shadow:0 0 6px var(--accent-teal);}
.status-dot.offline{background:var(--accent-red);box-shadow:0 0 6px var(--accent-red);}
.content{flex:1;padding:24px;overflow-y:auto;display:flex;flex-direction:column;gap:16px;}
.dash-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.dash-header h1{font-size:20px;font-weight:600;}
.time-range{display:flex;gap:4px;background:var(--bg-secondary);border-radius:3px;padding:2px;border:1px solid var(--border);}
.time-btn{
  padding:5px 12px;border-radius:2px;font-size:12px;font-family:var(--font-mono);
  cursor:pointer;border:none;background:transparent;color:var(--text-muted);transition:all .15s;
}
.time-btn:hover{color:var(--text-primary);}
.time-btn.active{background:var(--accent-amber);color:#000;font-weight:600;}
.btn{
  display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);
  font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);
  background:var(--bg-secondary);color:var(--text-secondary);transition:all .15s;
}
.btn:hover{border-color:var(--border-hover);background:var(--bg-tertiary);color:var(--text-primary);}
.btn-primary{background:var(--glow-amber);border-color:var(--accent-amber);color:var(--accent-amber);}
.btn-primary:hover{box-shadow:0 0 12px var(--glow-amber);}
.chart-card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;transition:border-color .2s;
}
.chart-card:hover{border-color:var(--border-hover);}
.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.chart-title{font-size:15px;font-weight:600;}
.chart-info{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);}
.chart-container svg{width:100%;height:auto;display:block;}
.chart-container .y-label{font-family:var(--font-mono);font-size:10px;fill:var(--text-muted);}
.chart-container .x-label{font-family:var(--font-mono);font-size:10px;fill:var(--text-muted);}
.chart-container .grid-line{stroke:rgba(30,41,59,0.4);stroke-width:.5;}
.chart-container .axis-line{stroke:var(--border);stroke-width:1;}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer;padding:4px 10px;border-radius:3px;transition:background .15s;}
.legend-item:hover{background:var(--bg-tertiary);}
.legend-item .swatch{width:20px;height:3px;border-radius:2px;flex-shrink:0;}
.legend-item .name{color:var(--text-secondary);}
.legend-item .val{font-family:var(--font-mono);font-size:12px;font-weight:600;margin-left:4px;}
.legend-item .unit{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);}
.legend-item.hidden{opacity:.35;}
.sel-card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;
}
.sel-body{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
.sel-tag{
  display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:500;
  background:var(--bg-secondary);border:1px solid var(--border);color:var(--text-secondary);transition:all .15s;
}
.sel-tag .rm{width:16px;height:16px;border-radius:50%;background:var(--bg-tertiary);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text-muted);cursor:pointer;}
.sel-tag .rm:hover{background:var(--accent-red);color:#fff;}
.sel-tag .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sel-add{
  display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:20px;font-size:12px;
  border:1px dashed var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all .15s;
}
.sel-add:hover{border-color:var(--accent-amber);color:var(--accent-amber);}
.dialog-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  z-index:100;display:none;align-items:center;justify-content:center;
}
.dialog-overlay.open{display:flex;}
.dialog{
  background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);
  width:440px;animation:pop .2s ease-out;
}
@keyframes pop{from{opacity:0;transform:scale(.95)translateY(10px)}to{opacity:1;transform:scale(1)translateY(0)}}
.dialog-header{display:flex;justify-content:space-between;align-items:center;padding:20px 24px 0;font-size:16px;font-weight:600;}
.dialog-close{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-size:14px;}
.dialog-close:hover{background:var(--bg-tertiary);color:var(--text-primary);}
.dialog-body{padding:20px 24px;display:flex;flex-direction:column;gap:16px;}
.dialog-footer{padding:16px 24px;display:flex;justify-content:flex-end;gap:8px;border-top:1px solid var(--border);}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-label{font-size:12px;color:var(--text-secondary);font-weight:500;}
.form-select,.form-input{padding:10px 12px;border-radius:3px;border:1px solid var(--border);background:var(--bg-primary);color:var(--text-primary);font-family:var(--font-mono);font-size:13px;outline:none;cursor:pointer;}
.form-select:focus,.form-input:focus{border-color:var(--accent-amber);}
.form-select option{background:var(--bg-secondary);color:var(--text-primary);}
.refresh-bar{height:1px;background:var(--border);position:relative;overflow:hidden;}
.refresh-bar::after{content:'';position:absolute;top:0;left:0;height:100%;width:30%;background:var(--accent-amber);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%{left:-30%}100%{left:100%}}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<nav class="sidebar">
  <div class="nav-item"><span class="nav-icon" style="font-size:16px">⚙</span><span class="nav-label">配置管理</span></div>
  <div class="nav-item"><span class="nav-icon">📊</span><span class="nav-label">运行监控</span></div>
  <div class="nav-item active"><span class="nav-icon">📈</span><span class="nav-label">实时趋势</span></div>
</nav>

<div class="main">
  <header class="topbar">
    <div class="topbar-left"><span class="topbar-title">IEC104 Simulator</span><span class="topbar-subtitle">v2.2.0</span></div>
    <div class="topbar-right">
      <div class="status-group">
        <div class="status-item"><span class="status-dot online"></span><span style="color:var(--accent-teal)">3</span><span style="color:var(--text-muted)">运行</span></div>
        <div class="status-item"><span class="status-dot offline"></span><span style="color:var(--accent-red)">2</span><span style="color:var(--text-muted)">停止</span></div>
      </div>
    </div>
  </header>
  <div class="refresh-bar"></div>

  <div class="content">

    <div style="font-size:13px;color:var(--text-secondary);line-height:1.8">
      选多个实例的测点，放同一张图对比趋势。5 秒刷新一次，最长 1 小时。
    </div>

    <div class="sel-card">
      <div style="font-size:14px;font-weight:500">选取的测点</div>
      <div class="sel-body" id="selTags"></div>
    </div>

    <div class="dash-header">
      <div class="time-range">
        <button class="time-btn" data-min="5">5m</button>
        <button class="time-btn active" data-min="15">15m</button>
        <button class="time-btn" data-min="30">30m</button>
        <button class="time-btn" data-min="60">1h</button>
      </div>
      <button class="btn btn-primary" onclick="openDialog()">+ 添加测点</button>
    </div>

    <div class="chart-card">
      <div class="chart-header">
        <span class="chart-title">📈 实时趋势</span>
        <span class="chart-info" id="chartInfo">等待数据...</span>
      </div>
      <div class="chart-container">
        <svg id="chartSVG" viewBox="0 0 700 280" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
      <div class="legend" id="legend"></div>
    </div>

  </div>
</div>

<div class="dialog-overlay" id="dialogOverlay" onclick="closeDialog(event)">
  <div class="dialog" onclick="event.stopPropagation()">
    <div class="dialog-header"><span>添加测点</span><button class="dialog-close" onclick="closeDialog()">✕</button></div>
    <div class="dialog-body">
      <div class="form-group"><label class="form-label">实例</label><select class="form-select" id="selInstance"></select></div>
      <div class="form-group"><label class="form-label">测点</label><select class="form-select" id="selPoint"></select></div>
      <div class="form-group"><label class="form-label">别名（可选）</label><input class="form-input" id="alias" placeholder="例如: 关口有功"></div>
    </div>
    <div class="dialog-footer">
      <button class="btn" onclick="closeDialog()">取消</button>
      <button class="btn btn-primary" onclick="addTrace()">添加</button>
    </div>
  </div>
</div>

<script>
const COLORS = ['#14b8a6','#f59e0b','#3b82f6','#a855f7','#ec4899','#22d3ee','#f97316','#8b5cf6'];
const INSTANCES = {
  '关口表': [{ioa:16385,name:'有功功率',unit:'kW'},{ioa:16386,name:'A相电流',unit:'A'},{ioa:16389,name:'仪表频率',unit:'Hz'}],
  '储能-01': [{ioa:16385,name:'充放电功率',unit:'kW'},{ioa:16386,name:'电池SOC',unit:'%'},{ioa:25089,name:'系统有功功率控制值',unit:'kW'}],
  '储能-02': [{ioa:16385,name:'充放电功率',unit:'kW'},{ioa:16386,name:'电池SOC',unit:'%'}],
  '光伏': [{ioa:16385,name:'可控状态',unit:''},{ioa:16386,name:'有功功率',unit:'kW'}],
  'FCR': [{ioa:16385,name:'ap_exp_percent',unit:'MW'},{ioa:16389,name:'fcr_p1_setpoint',unit:'MW'}],
};
const INST_NAMES = Object.keys(INSTANCES);
let traces = [];
let timeRange = 15;

function genData(base, amp, noise) {
  let v=base; return Array.from({length:720},()=>{v+=(Math.random()-.5)*noise*2;if(Math.abs(v-base)>amp)v+=(base-v)*.1;return +v.toFixed(1)});
}

function initDefault() {
  [
    {inst:'关口表',ioa:16385},{inst:'储能-01',ioa:16386},
    {inst:'储能-01',ioa:16385},{inst:'光伏',ioa:16386}
  ].forEach((d,i)=>{
    const pt=INSTANCES[d.inst].find(p=>p.ioa===d.ioa)||{};
    traces.push({...d,alias:'',colorIdx:i,data:genData(pt.unit==='%'?60:120,pt.unit==='%'?15:40,2),unit:pt.unit,name:pt.name});
  });
}

function render() {
  const svg=document.getElementById('chartSVG'),W=700,H=280,pad={t:20,r:20,b:36,l:50},cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  const pts=Math.min(timeRange*60/5,720);
  let all=[];
  traces.forEach((t,i)=>{if(!document.querySelector(`.legend-item[data-idx="${i}"]`)?.classList.contains('hidden'))all=all.concat(t.data.slice(-pts));});
  if(!all.length){svg.innerHTML='';return;}
  let ymin=Math.min(...all),ymax=Math.max(...all),yr=ymax-ymin||1;ymin-=yr*.1;ymax+=yr*.1;yr=ymax-ymin;
  let html=[];
  for(let i=0;i<=5;i++){let y=pad.t+ch-(i/5)*ch;html.push(`<line class="grid-line" x1="${pad.l}" y1="${y}" x2="${pad.l+cw}" y2="${y}"/>`);html.push(`<text class="y-label" x="${pad.l-6}" y="${y+3}" text-anchor="end">${(ymin+i/5*yr).toFixed(1)}</text>`);}
  html.push(`<line class="axis-line" x1="${pad.l}" y1="${pad.t}" x2="${pad.l}" y2="${pad.t+ch}"/><line class="axis-line" x1="${pad.l}" y1="${pad.t+ch}" x2="${pad.l+cw}" y2="${pad.t+ch}"/>`);
  const n=new Date();
  for(let i=0;i<=4;i++){let t=new Date(n.getTime()-timeRange*60*1000*(1-i/4));html.push(`<text class="x-label" x="${pad.l+i/4*cw}" y="${pad.t+ch+16}" text-anchor="middle">${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}</text>`);}
  const step=cw/(pts-1);
  traces.forEach((t,vi)=>{if(document.querySelector(`.legend-item[data-idx="${vi}"]`)?.classList.contains('hidden'))return;
    const sl=t.data.slice(-pts),cl=COLORS[t.colorIdx%COLORS.length];
    html.push(`<polyline points="${sl.map((v,i)=>`${pad.l+i*step},${pad.t+ch-((v-ymin)/yr)*ch}`).join(' ')}" style="fill:none;stroke:${cl};stroke-width:1.5;stroke-linejoin:round;stroke-linecap:round;"/>`);
  });
  svg.innerHTML=html.join('\n');
  document.getElementById('chartInfo').textContent=`更新于 ${n.toLocaleTimeString()} · ${pts} 点`;
}

function renderTags(){
  document.getElementById('selTags').innerHTML=traces.map((t,i)=>`<span class="sel-tag"><span class="dot" style="background:${COLORS[t.colorIdx%COLORS.length]}"></span>${t.inst}·${t.alias||t.name||('IOA:'+t.ioa)}<span class="rm" onclick="removeTrace(${i})">✕</span></span>`).join('')+'<span class="sel-add" onclick="openDialog()">+ 添加</span>';
}

function renderLegend(){
  document.getElementById('legend').innerHTML=traces.map((t,i)=>{const l=t.data[t.data.length-1]||0;return `<div class="legend-item" data-idx="${i}" onclick="this.classList.toggle('hidden');render()"><span class="swatch" style="background:${COLORS[t.colorIdx%COLORS.length]}"></span><span class="name">${t.inst}·${t.alias||t.name||('IOA:'+t.ioa)}</span><span class="val">${l.toFixed(1)}</span><span class="unit">${t.unit||''}</span></div>`;}).join('');
}

function removeTrace(i){traces.splice(i,1);renderTags();renderLegend();render();}

function openDialog(){
  const s=document.getElementById('selInstance');s.innerHTML='<option value="">—</option>';
  INST_NAMES.forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n;s.appendChild(o);});
  document.getElementById('dialogOverlay').classList.add('open');updatePoints();
}
function closeDialog(e){if(e&&e.target!==e.currentTarget)return;document.getElementById('dialogOverlay').classList.remove('open');}
function updatePoints(){const i=document.getElementById('selInstance').value,s=document.getElementById('selPoint');s.innerHTML='';if(!i){s.innerHTML='<option value="">先选实例</option>';return;}(INSTANCES[i]||[]).forEach(p=>{const o=document.createElement('option');o.value=p.ioa;o.textContent=`${p.name}(${p.ioa})`;s.appendChild(o);});}
document.getElementById('selInstance').addEventListener('change',updatePoints);
function addTrace(){
  const inst=document.getElementById('selInstance').value,ioa=parseInt(document.getElementById('selPoint').value),alias=document.getElementById('alias').value.trim();
  if(!inst||!ioa)return;const pt=(INSTANCES[inst]||[]).find(p=>p.ioa===ioa)||{};
  traces.push({inst,ioa,alias,colorIdx:traces.length,data:genData(pt.unit==='%'?60:120,pt.unit==='%'?15:40,2),unit:pt.unit,name:pt.name});
  renderTags();renderLegend();render();closeDialog();
}
document.querySelectorAll('.time-btn').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('.time-btn').forEach(x=>x.classList.remove('active'));this.classList.add('active');timeRange=parseInt(this.dataset.min);render();}));

function update(){
  traces.forEach(t=>{const l=t.data[t.data.length-1]||50,a=t.unit==='%'?15:40,n=t.unit==='%'?.5:2,v=+((l+(Math.random()-.5)*n*2).toFixed(1));t.data.push(v>l+a?l+a:v<l-a?l-a:v);if(t.data.length>720)t.data.shift();});
  render();renderLegend();
}

initDefault();renderTags();renderLegend();render();setInterval(update,5000);
</script>
</body>
</html>
